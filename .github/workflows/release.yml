name: 🚀 B-579 Arwah Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:

  build:
    name: 🔨 Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: b579-arwah-linux-x86_64
            ext: tar.gz
            binary: arwah

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: b579-arwah-linux-arm64
            ext: tar.gz
            binary: arwah
            cross: true

          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: b579-arwah-macos-x86_64
            ext: tar.gz
            binary: arwah

          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: b579-arwah-macos-arm64
            ext: tar.gz
            binary: arwah

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: b579-arwah-windows-x86_64
            ext: zip
            binary: arwah.exe

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🦀 Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 📦 Install Linux dependencies
        if: runner.os == 'Linux' && !matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcap-dev build-essential

      - name: 📦 Install cross-compilation tools
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            libpcap-dev
          cargo install cross --locked 2>/dev/null || true

      - name: 📦 Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install libpcap

      - name: 📦 Install Npcap SDK
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://npcap.com/dist/npcap-sdk-1.13.zip" `
            -OutFile "sdk.zip"
          Expand-Archive -Path "sdk.zip" -DestinationPath "C:\NpcapSDK"
          echo "NPCAP_SDK=C:\NpcapSDK" >> $env:GITHUB_ENV
          echo "LIB=C:\NpcapSDK\Lib\x64;$env:LIB" >> $env:GITHUB_ENV

      - name: 🔨 Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: 🔨 Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}
        continue-on-error: true

      - name: 📦 Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist/b579-arwah

          # Binary
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} \
            dist/b579-arwah/ 2>/dev/null || true

          # Documentation
          cp README.md dist/b579-arwah/ 2>/dev/null || true
          cp LICENSE dist/b579-arwah/ 2>/dev/null || true
          cp CHANGELOG.md dist/b579-arwah/ 2>/dev/null || true

          # Data files (service probes, fingerprints)
          if [ -d "data" ]; then
            cp -r data dist/b579-arwah/data
          fi

          # Lua scripts (plugins)
          if [ -d "scripts" ]; then
            cp -r scripts dist/b579-arwah/scripts
          fi

          # Create archive
          cd dist && tar czf ../${{ matrix.artifact }}.${{ matrix.ext }} b579-arwah/

          # Show contents
          echo "=== Archive contents ==="
          tar tzf ../${{ matrix.artifact }}.${{ matrix.ext }}

          # Show binary info
          echo ""
          echo "=== Binary info ==="
          file b579-arwah/${{ matrix.binary }} 2>/dev/null || true
          ls -lh b579-arwah/${{ matrix.binary }} 2>/dev/null || true

      - name: 📦 Package (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist\b579-arwah

          # Binary
          Copy-Item "target\${{ matrix.target }}\release\${{ matrix.binary }}" `
            "dist\b579-arwah\"

          # Documentation
          Copy-Item "README.md" "dist\b579-arwah\" -ErrorAction SilentlyContinue
          Copy-Item "LICENSE" "dist\b579-arwah\" -ErrorAction SilentlyContinue
          Copy-Item "CHANGELOG.md" "dist\b579-arwah\" -ErrorAction SilentlyContinue

          # Data files
          if (Test-Path "data") {
            Copy-Item -Recurse "data" "dist\b579-arwah\data"
          }

          # Scripts
          if (Test-Path "scripts") {
            Copy-Item -Recurse "scripts" "dist\b579-arwah\scripts"
          }

          Compress-Archive -Path "dist\b579-arwah\*" `
            -DestinationPath "${{ matrix.artifact }}.${{ matrix.ext }}"

      # ── Upload ──
      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.${{ matrix.ext }}


  checksums:
    name: 🔐 Generate Checksums
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: 🔐 Generate SHA256 checksums
        run: |
          cd artifacts
          echo "# B-579 Arwah ${{ github.ref_name }} — SHA256 Checksums" > ../SHA256SUMS.txt
          echo "" >> ../SHA256SUMS.txt
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" \) | sort | while read f; do
            sha256sum "$f" >> ../SHA256SUMS.txt
          done
          cat ../SHA256SUMS.txt

      - name: 📤 Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: SHA256SUMS.txt

  release:
    name: 🚀 Create Release
    needs: [build, checksums]
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: 📋 List all artifacts
        run: find artifacts/ -type f | sort

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/checksums/SHA256SUMS.txt
          body: |
            ## 🔱 B-579 Arwah ${{ github.ref_name }}

            **High-Performance Network Scanner — Rust/C Hybrid Engine**

            > *Speed of Masscan + Analysis power of Nmap*

            ---

            ### 📥 Downloads

            | Platform | Architecture | File |
            |----------|-------------|------|
            | 🐧 Linux | x86_64 | `b579-arwah-linux-x86_64.tar.gz` |
            | 🐧 Linux | ARM64 | `b579-arwah-linux-arm64.tar.gz` |
            | 🍎 macOS | x86_64 (Intel) | `b579-arwah-macos-x86_64.tar.gz` |
            | 🍎 macOS | ARM64 (Apple Silicon) | `b579-arwah-macos-arm64.tar.gz` |
            | 🪟 Windows | x86_64 | `b579-arwah-windows-x86_64.zip` |

            ### 📋 Requirements

            | Platform | Requirements |
            |----------|-------------|
            | **Linux** | `libpcap` installed, **root access** required |
            | **macOS** | **root access** required |
            | **Windows** | [Npcap](https://npcap.com/) installed, **Administrator** |

            ### 🚀 Quick Start

            ```bash
            # Linux/macOS
            tar xzf b579-arwah-linux-x86_64.tar.gz
            cd b579-arwah
            sudo ./arwah -p 80,443 192.168.1.0/24

            # Full SYN scan at 100k packets/sec
            sudo ./arwah -s syn --rate 100000 -p 1-65535 10.0.0.0/8

            # With service detection
            sudo ./arwah -s syn -V -p 1-1000 192.168.1.0/24 -o json --output-file results.json
            ```

            ### 🔐 Verify Downloads

            ```bash
            sha256sum -c SHA256SUMS.txt
            ```

            ---

            **Full changelog**: See below ⬇️