name: 🔱 B-579 Arwah CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-D warnings"

jobs:

  linux:
    name: 🐧 Linux (${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, nightly]

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🦀 Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: 📦 Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libpcap-dev \
            pkg-config \
            linux-headers-$(uname -r)

      - name: 💾 Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: linux-${{ matrix.rust }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-${{ matrix.rust }}-

      - name: 🔨 Build (all crates)
        run: cargo build --workspace --release --verbose

      - name: ✅ Unit Tests
        run: cargo test --workspace --verbose

      - name: 🧪 Doc Tests
        run: cargo test --workspace --doc

      - name: 🔍 Clippy
        if: matrix.rust == 'stable'
        run: cargo clippy --workspace --all-targets -- -D warnings
        continue-on-error: true

      - name: 📝 Format Check
        if: matrix.rust == 'stable'
        run: cargo fmt --all -- --check

      - name: 🧪 Integration Tests (requires root)
        if: matrix.rust == 'stable'
        run: sudo -E cargo test --workspace -- --ignored
        continue-on-error: true

      - name: 📊 Binary size check
        if: matrix.rust == 'stable'
        run: |
          echo "=== Binary Info ==="
          ls -lh target/release/arwah 2>/dev/null || echo "Binary not found"
          file target/release/arwah 2>/dev/null || true
          echo ""
          echo "=== Crate sizes ==="
          du -sh target/release/build/b579-* 2>/dev/null || true

  macos:
    name: 🍎 macOS (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
          - target: aarch64-apple-darwin

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🦀 Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 📦 Install dependencies
        run: brew install libpcap

      - name: 💾 Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: macos-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-${{ matrix.target }}-

      - name: 🔨 Build
        run: cargo build --workspace --release --target ${{ matrix.target }} --verbose

      - name: ✅ Unit Tests
        if: matrix.target == 'aarch64-apple-darwin'
        run: cargo test --workspace --verbose

  windows:
    name: 🪟 Windows
    runs-on: windows-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🦀 Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 📦 Install Npcap SDK
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://npcap.com/dist/npcap-sdk-1.13.zip" `
            -OutFile "npcap-sdk.zip"
          Expand-Archive -Path "npcap-sdk.zip" -DestinationPath "C:\NpcapSDK"
          echo "NPCAP_SDK=C:\NpcapSDK" >> $env:GITHUB_ENV
          echo "LIB=C:\NpcapSDK\Lib\x64;$env:LIB" >> $env:GITHUB_ENV

      - name: 📦 Install Npcap Runtime
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://npcap.com/dist/npcap-1.80-oem.exe" `
            -OutFile "npcap.exe"
          Start-Process -FilePath "npcap.exe" `
            -ArgumentList "/S /winpcap_mode=yes" -Wait
        continue-on-error: true

      - name: 💾 Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\bin\
            ~\.cargo\registry\index\
            ~\.cargo\registry\cache\
            ~\.cargo\git\db\
            target\
          key: windows-stable-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-stable-

      - name: 🔨 Build
        run: cargo build --workspace --release --verbose

      - name: ✅ Unit Tests
        run: cargo test --workspace --verbose
        continue-on-error: true

  quality:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🦀 Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: 📦 Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcap-dev build-essential

      - name: 💾 Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: quality-stable-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: quality-stable-

      - name: 📝 Rustfmt (all crates)
        run: cargo fmt --all -- --check

      - name: 🔍 Clippy (all crates)
        run: cargo clippy --workspace --all-targets -- -D warnings
        continue-on-error: true

      - name: 📊 Workspace structure check
        run: |
          echo "══════════════════════════════════════"
          echo "  B-579 Arwah — Workspace Structure"
          echo "══════════════════════════════════════"
          echo ""
          echo "=== Crates ==="
          find crates/ -name "Cargo.toml" -exec grep -l "name" {} \; | sort
          echo ""
          echo "=== Binary ==="
          find bins/ -name "Cargo.toml" -exec grep -l "name" {} \; | sort
          echo ""
          echo "=== Rust source files ==="
          find crates/ bins/ -name "*.rs" | wc -l
          echo " .rs files"
          echo ""
          echo "=== Rust lines of code ==="
          find crates/ bins/ -name "*.rs" -exec cat {} \; | wc -l
          echo " lines"

      - name: 📊 C code quality check
        run: |
          echo "══════════════════════════════════════"
          echo "  C Source Analysis"
          echo "══════════════════════════════════════"
          echo ""
          echo "=== C/H files ==="
          find libs/ crates/ -name "*.c" -o -name "*.h" | sort
          echo ""
          echo "=== Line counts ==="
          find libs/ crates/ \( -name "*.c" -o -name "*.h" \) \
            -exec wc -l {} \; | sort -rn
          echo ""
          echo "=== Checking for tabs ==="
          if grep -rn "$(printf '\t')" libs/ crates/ \
            --include="*.c" --include="*.h" 2>/dev/null; then
            echo "⚠️  Found tabs in C code (prefer spaces)"
          else
            echo "✅ No tabs found in C code"
          fi
          echo ""
          echo "=== Checking for TODO/FIXME ==="
          grep -rn "TODO\|FIXME\|HACK\|XXX" libs/ crates/ \
            --include="*.c" --include="*.h" --include="*.rs" || \
            echo "✅ No TODOs found"

      - name: 🧩 Check dependency graph
        run: |
          echo "=== Workspace dependency tree ==="
          cargo tree --workspace --depth 1 2>/dev/null || \
            echo "cargo-tree not available, skipping"

  audit:
    name: 🛡️ Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🦀 Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 🛡️ Install cargo-audit
        run: cargo install cargo-audit --locked
        continue-on-error: true

      - name: 🔒 Audit dependencies
        run: cargo audit
        continue-on-error: true

      - name: 🔍 Check unsafe usage
        run: |
          echo "══════════════════════════════════════"
          echo "  Unsafe Code Audit"
          echo "══════════════════════════════════════"
          echo ""
          echo "=== Files with unsafe blocks ==="
          grep -rn "unsafe" crates/ bins/ --include="*.rs" | \
            grep -v "//.*unsafe" | \
            grep -v "test" || echo "✅ No unsafe blocks found"
          echo ""
          echo "=== Count of unsafe blocks ==="
          grep -c "unsafe {" crates/ bins/ -r --include="*.rs" 2>/dev/null | \
            grep -v ":0$" || echo "0 unsafe blocks"

  bench:
    name: 📈 Benchmarks
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🦀 Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 📦 Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcap-dev build-essential

      - name: 💾 Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: bench-stable-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: bench-stable-

      - name: 📈 Run benchmarks
        run: cargo bench --workspace 2>&1 | tee bench-results.txt
        continue-on-error: true

      - name: 📤 Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: bench-results.txt
          if-no-files-found: ignore

  release-build:
    name: 📦 Build ${{ matrix.artifact }}
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [linux, macos, windows, quality]
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: b579-arwah-linux-x86_64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: b579-arwah-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: b579-arwah-macos-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: b579-arwah-windows-x86_64

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🦀 Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 📦 Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcap-dev build-essential

      - name: 📦 Install Npcap SDK (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://npcap.com/dist/npcap-sdk-1.13.zip" `
            -OutFile "npcap-sdk.zip"
          Expand-Archive -Path "npcap-sdk.zip" -DestinationPath "C:\NpcapSDK"
          echo "NPCAP_SDK=C:\NpcapSDK" >> $env:GITHUB_ENV
          echo "LIB=C:\NpcapSDK\Lib\x64;$env:LIB" >> $env:GITHUB_ENV

      - name: 🔨 Build Release
        run: cargo build --release --target ${{ matrix.target }}

      - name: 📦 Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/arwah dist/
          cp README.md LICENSE dist/ 2>/dev/null || true

          # Include data files and scripts
          cp -r data dist/data 2>/dev/null || true
          cp -r scripts dist/scripts 2>/dev/null || true

          cd dist && tar czf ../${{ matrix.artifact }}.tar.gz *

      - name: 📦 Package (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target\${{ matrix.target }}\release\arwah.exe" "dist\"
          Copy-Item "README.md" "dist\" -ErrorAction SilentlyContinue
          Copy-Item "LICENSE" "dist\" -ErrorAction SilentlyContinue

          # Include data files and scripts
          if (Test-Path "data") {
            Copy-Item -Recurse "data" "dist\data"
          }
          if (Test-Path "scripts") {
            Copy-Item -Recurse "scripts" "dist\scripts"
          }

          Compress-Archive -Path "dist\*" -DestinationPath "${{ matrix.artifact }}.zip"

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
          if-no-files-found: ignore